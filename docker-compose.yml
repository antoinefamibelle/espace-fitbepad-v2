services:
  postgres:
    image: postgres:16-alpine
    container_name: coaching_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload_dev_password
      POSTGRES_DB: coaching_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d coaching_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
